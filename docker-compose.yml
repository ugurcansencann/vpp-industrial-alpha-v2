version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  # Bizim FastAPI Uygulamamız
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/vpp_db
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # Veritabanımız (PostgreSQL)
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=vpp_db
    ports:
      - "5432:5432"
  airflow:
    image: apache/airflow:2.7.1-python3.9
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://user:password@db:5432/vpp_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=87I_S686fX_H0OqD6pC1S6_6TqfW7K3T5_9vX8_vR88=
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/app
    command: bash -c "airflow db init && airflow standalone"
    ports:
      - "8080:8080"
    depends_on:
      - db